name: openpup
description: OpenPup - single-owner multi-agent desktop companion
publish_to: 'none'
version: 0.2.1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Rust FFI ─────────────────────────────────────────────────────────────
  flutter_rust_bridge: ^2.0.0

  # ── State Management ─────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # ── Desktop Window Management ────────────────────────────────────────────
  window_manager: ^0.4.0
  tray_manager: ^0.3.0
  bitsdojo_window: ^0.1.6
  file_selector: ^1.0.0
  hotkey_manager: ^0.2.0
  local_notifier: ^0.1.6

  # ── UI Components ────────────────────────────────────────────────────────
  flutter_markdown: ^0.7.0
  url_launcher: ^6.2.0
  shimmer: ^3.0.0

  # ── Data & Formatting ────────────────────────────────────────────────────
  intl: ^0.20.2
  json_annotation: ^4.8.0
  freezed_annotation: ^2.4.4
  uuid: ^4.3.0

  # ── Networking ───────────────────────────────────────────────────────────
  http: ^1.2.0
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  freezed: ^2.5.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - lib/i18n/locales/zh.json
    - lib/i18n/locales/en.json